data:
  source: hf
  dataset_name: ZODAOfficial/MindEdit-Bench
  configs: [single_view_spatial_editing, cross_view_visibility]
  split: test
model:
  backend: api
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  api_base: http://127.0.0.1:8000/v1
  api_key: EMPTY
  max_new_tokens: 1200
  temperature: 0.2
  top_p: 0.9
critic:
  mode: hybrid
  symbolic_weight: 0.35
  vlm_weight: 0.65
  transition_threshold: 0.58
  causal_threshold: 0.08
  global_threshold: 0.62
  intervention_top_k: 4
repair:
  enabled: true
  num_candidates: 3
  abstain_margin: 0.02
run:
  output_dir: outputs/mindedit_vllm_seed42
  seed: 42
  num_traces: 3
  max_reasoning_steps: 8
  run_baselines: true
